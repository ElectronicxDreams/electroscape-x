<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTROSCAPE // IMAGE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #000;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    overflow: hidden;
}

/* Subtle scan line overlay */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,255,204,0.012) 3px,
        rgba(0,255,204,0.012) 4px
    );
    pointer-events: none;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
}

.label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 8px;
    color: #00ffcc;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
}

.title {
    font-family: 'Michroma', sans-serif;
    font-size: clamp(18px, 4vw, 36px);
    letter-spacing: 6px;
    color: #fff;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
}

.divider {
    width: 60px;
    height: 1px;
    background: #00ffcc;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
    box-shadow: 0 0 10px rgba(0,255,204,0.4);
}

.message {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: #fff;
    text-transform: uppercase;
    line-height: 2;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
}

.message span {
    color: #00ffcc;
    opacity: 0.7;
}

.back-link {
    margin-top: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    border: 1px solid #1a1a1a;
    padding: 10px 24px;
    transition: color 0.3s, border-color 0.3s;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
}

.back-link:hover {
    color: #00ffcc;
    border-color: #00ffcc;
}

/* --- TOP NAV --- */
.top-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    z-index: 100;
}

.top-nav a {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    transition: color 0.3s;
}

.top-nav a:hover { color: #00ffcc; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="https://electroscapex.com">ELECTROSCAPE</a>
        <a href="https://electroscapex.com/tv">TV</a>
    </nav>
    <div class="container">
        <div class="label">Electroscape // Image Vault</div>
        <div class="title">Coming Soon</div>
        <div class="divider"></div>
        <div class="message">
            Digital Artwork<br>
            <span>Transmission incoming</span>
        </div>
        <a class="back-link" href="https://electroscapex.com">Return to Base</a>
    </div>
</body>
</html>
