<!--
    Name: index.html | Version (vx): 3.0.0
    Project: Electroscape
    Description: Music video gallery page with YouTube IFrame API player.
                 Track data is loaded from tracks.json — edit that file to
                 add, remove, or reorder tracks. No changes needed here.
                 Styles live in style.css. Playback logic lives in player.js.
                 Clicking a card loads it into the featured player at the top.
                 Prev / Next buttons step through the playlist in order.
                 Shuffle randomises the card grid and resets the queue.
                 v2.1 — Orbital HUD footer added (persistent mini-player bar).
                 v2.9.0 — Unified view controls and centered action bar.
    Stages:
        Stage 1 — HEAD        : Page setup, font import, stylesheet link
        Stage 2 — CSS STYLES  : Moved to style.css
        Stage 3 — BODY HTML   : The visible page structure (nav, player, buttons, video grid)
        Stage 4 — JAVASCRIPT  : Moved to player.js (loaded at bottom of body)

    File structure — all files must sit in the same folder on GitHub:
        index.html   ← this file (page structure only — rarely needs editing)
        style.css    ← all visual styles (edit for colour/layout changes)
        player.js    ← all playback logic (edit for behaviour changes)
        tracks.json  ← track list only (THIS is the file you edit day-to-day)
-->

<!-- ============================================================ -->
<!-- STAGE 1 START: HEAD — Page setup, title, font, stylesheet    -->
<!-- ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Sets the character encoding so special characters display correctly -->
    <meta charset="UTF-8">

    <!-- The text shown in the browser tab -->
    <title>Electroscape</title>

    <!--
        Loads the "Orbitron" font from Google Fonts.
        This is the futuristic-style font used everywhere on the page.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <!--
        Loads all visual styles from the external stylesheet.
        To change colours, layout, or spacing — edit style.css, not this file.
    -->
    <link rel="stylesheet" href="style.css?v=3.0.0">

</head>
<!-- ============================================================ -->
<!-- STAGE 1 END                                                   -->
<!-- ============================================================ -->


<!-- ============================================================ -->
<!-- STAGE 3 START: BODY HTML — Visible page structure            -->
<!-- ============================================================ -->
<body>

    <!-- SECTION 3A: TOP NAVIGATION -->
    <nav>
        <a href='https://beacons.ai/weblinks' target='_blank'>Weblinks</a>
        <a href='https://www.youtube.com/playlist?list=PLdd12CvCHG0sdBwilp-LipaZkgzR2gJVq' target='_blank'>YouTube</a>
        <a href='https://open.spotify.com/user/3147hrg3uxl6ywo7dja4zzwhrdha/playlists' target='_blank'>Spotify</a>
        <a href='https://www.youtube.com/playlist?list=PLdd12CvCHG0sdBwilp-LipaZkgzR2gJVq&playnext=1&index=1' target='_blank'>X</a>
    </nav>


    <!-- SECTION 3B: PAGE TITLE -->
    <h1 class="fly-in-title">
        <span>E</span><span>L</span><span>E</span><span>C</span><span>T</span><span>R</span><span>O</span><span>S</span><span>C</span><span>A</span><span>P</span><span>E</span>
    </h1>


    <!-- SECTION 3C: FEATURED VIDEO PLAYER -->
    <div class="featured-box">
        <div id="now-playing-label">Initiate Audio Sequence</div>
        <div id="player-container">
            <!-- YouTube IFrame API injects the actual player into this empty div -->
            <div id="yt-player"></div>
        </div>
    </div>


    <!-- SECTION 3D: ACTION BAR — Prev / Shuffle / Next buttons -->
    <div class="action-bar" style="margin-bottom: 20px;">
        <button class="ctrl-btn" id="prev-btn">[ Previous ]</button>
        <button class="ctrl-btn shuffle-btn" id="shuffle-btn">[ Override Sequence ]</button>
        <button class="ctrl-btn" id="next-btn">[ Next ]</button>
    </div>

    <!-- SECTION 3D-2: ACTION BAR — Unified Grid View Controls -->
    <div class="action-bar" style="margin-top: 0;">
        <div class="view-box">
            <span class="grid-btn" data-size="dense">MICRO</span>
            <span style="opacity: 0.2; pointer-events: none;">|</span>
            <span class="grid-btn" data-size="default">CORE</span>
            <span style="opacity: 0.2; pointer-events: none;">|</span>
            <span class="grid-btn" data-size="max">MAX</span>
        </div>
    </div>


    <!-- SECTION 3E: VIDEO GRID -->
    <div class="grid" id="video-grid">
        <!-- Cards are injected here automatically from tracks.json -->
    </div>

<!-- ============================================================ -->
<!-- STAGE 3 END                                                   -->
<!-- ============================================================ -->


    <!-- ============================================================ -->
    <!-- FOOTER VERSION DISPLAY                                        -->
    <!-- ============================================================ -->
    <div style="margin-top: 40px; padding: 15px 0; text-align: center; color: #444; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid #1a1a1a; margin-bottom: 80px;">
        <!-- change version vx --><span style="color: #00ffcc;">3.0.0</span><!-- end change version -->
    </div>


    <!-- ============================================================ -->
    <!-- SECTION 3F: ORBITAL HUD — Persistent footer mini-player      -->
    <!-- ============================================================ -->
    <div id="hud-dock">
        <!-- Thin progress line across the very top of the HUD bar. -->
        <div id="hud-progress-container">
            <div id="hud-progress-bar"></div>
        </div>

        <!-- Inner row: track title on the left, controls on the right -->
        <div id="hud-inner">
            <div id="hud-track-title">Initiate Audio Sequence</div>
            <div id="hud-controls">
                <button class="hud-btn" id="hud-prev">&#9664;&#9664;</button>
                <button class="hud-btn hud-playpause" id="hud-playpause">&#9654;</button>
                <button class="hud-btn" id="hud-next">&#9654;&#9654;</button>
            </div>
        </div>
    </div>
    <!-- ============================================================ -->
    <!-- SECTION 3F END                                               -->
    <!-- ============================================================ -->


    <!-- Scripts MUST stay at the bottom of the body -->
    <script src="player.js?v=3.0.0"></script>
    <script src="https://www.youtube.com/iframe_api" async></script>

</body>
</html>
