<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electroscape - Image Vault</title>
    <meta name="description" content="Electroscape Image Vault — a curated collection of widescreen and mobile wallpapers.">
    <meta property="og:title" content="Electroscape - Image Vault">
    <meta property="og:description" content="A curated collection of widescreen and mobile wallpapers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://electroscapex.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Electroscape - Image Vault">
    <meta name="twitter:description" content="A curated collection of widescreen and mobile wallpapers.">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00FFE6; --bg: #07080d; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* ── HEADER ─────────────────────────────────────────────── */
        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 52px;
            background: rgba(7, 8, 13, 0.96);
            border-bottom: 1px solid rgba(0,255,230,0.08);
            position: sticky;
            top: 0;
            z-index: 200;
        }

        /* Burger button — circle, matching mobile2 style */
        #nav-burger {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(0,255,230,0.22);
            background: rgba(0,255,230,0.05);
            color: var(--cyan);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; cursor: pointer; flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }
        #nav-burger:hover,
        #nav-burger.is-open { background: rgba(0,255,230,0.10); border-color: var(--cyan); }
        #nav-burger span {
            display: block; width: 14px; height: 1.5px;
            background: var(--cyan); border-radius: 2px;
            transition: opacity 0.2s;
        }

        /* Wordmark — character fade-in animation from mobile2 */
        .site-title {
            font-family: 'Michroma', 'Orbitron', sans-serif;
            font-size: clamp(7px, 1.6vw, 13px);
            letter-spacing: clamp(4px, 1.2vw, 10px);
            color: var(--cyan);
            text-decoration: none;
            flex: 1; text-align: center;
            overflow: visible;
        }
        .site-title span {
            display: inline-block;
            opacity: 0;
            animation: letterFade 0.5s ease forwards;
        }
        .site-title span:nth-child(1)  { animation-delay: 0.00s; }
        .site-title span:nth-child(2)  { animation-delay: 0.08s; }
        .site-title span:nth-child(3)  { animation-delay: 0.16s; }
        .site-title span:nth-child(4)  { animation-delay: 0.24s; }
        .site-title span:nth-child(5)  { animation-delay: 0.32s; }
        .site-title span:nth-child(6)  { animation-delay: 0.40s; }
        .site-title span:nth-child(7)  { animation-delay: 0.48s; }
        .site-title span:nth-child(8)  { animation-delay: 0.56s; }
        .site-title span:nth-child(9)  { animation-delay: 0.64s; }
        .site-title span:nth-child(10) { animation-delay: 0.72s; }
        .site-title span:nth-child(11) { animation-delay: 0.80s; }
        .site-title span:nth-child(12) { animation-delay: 0.88s; }
        @keyframes letterFade {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .site-version {
            font-family: 'Michroma', sans-serif;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(0,255,230,0.4);
            flex-shrink: 0;
            pointer-events: none;
            min-width: 36px;
            text-align: right;
        }

        /* ── NAV POPUP — frosted glass, mid-screen, no blackout ──── */
        #nav-popup {
            position: fixed;
            top: 66px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            z-index: 9500;
            width: min(300px, 88vw);
            background: linear-gradient(160deg, rgba(8,10,20,0.88), rgba(4,6,14,0.82));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(0,255,230,0.14);
            border-radius: 12px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(0,255,230,0.06) inset;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #nav-popup.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        /* No backdrop — screen stays clear, no blackout */
        .nav-popup-item {
            display: flex; align-items: center; justify-content: center;
            padding: 14px 20px;
            font-family: 'Michroma', sans-serif;
            font-size: 8px; letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: transparent;
            width: 100%; text-align: center;
            cursor: pointer;
            transition: color 0.18s, background 0.18s;
        }
        .nav-popup-item:first-child { border-radius: 12px 12px 0 0; }
        .nav-popup-item:last-child  { border-bottom: none; border-radius: 0 0 12px 12px; }
        .nav-popup-item:hover       { color: var(--cyan); background: rgba(0,255,230,0.05); }

        /* ── ICON TABS — filter row ──────────────────────────────── */
        .sticky-container {
            position: sticky;
            top: 52px;
            background: var(--bg);
            z-index: 100;
            border-bottom: 1px solid rgba(0,255,230,0.07);
            padding: 10px 16px 10px;
            margin-bottom: 16px;
        }

        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Icon tab card */
        .filter-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: none;
            border: 1px solid rgba(0,255,230,0.12);
            color: rgba(255,255,255,0.35);
            font-family: 'Michroma', sans-serif;
            font-size: 7px;
            letter-spacing: 3px;
            cursor: pointer;
            padding: 10px 22px 8px;
            border-radius: 10px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            min-width: 80px;
        }
        .filter-btn svg {
            width: 20px; height: 20px;
            stroke: currentColor; stroke-width: 1.4;
            fill: none; flex-shrink: 0;
        }
        .filter-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(0,255,230,0.35);
        }
        .filter-btn.active {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0,255,230,0.06);
            box-shadow: 0 0 12px rgba(0,255,230,0.1);
        }
        .filter-btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

        /* ── Mobile adjustments ──────────────────────────────────── */
        @media (max-width: 480px) {
            .filter-btn { min-width: 68px; padding: 8px 14px 7px; font-size: 6px; }
            .filter-btn svg { width: 17px; height: 17px; }
            .site-header { padding: 0 10px; }
        }

        #loading {
            font-size: 10px;
            letter-spacing: 6px;
            color: rgba(0,255,204,0.4);
            padding: 60px 0;
            text-align: center;
        }

        .archive-wrapper {
            padding: 0 10px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .tile {
            position: relative;
            background: #0a0a0a;
            cursor: pointer;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tile:hover {
            transform: translateY(-4px);
            border-color: var(--cyan);
            box-shadow: 0 8px 24px rgba(0,255,204,0.12);
            z-index: 2;
        }

        .tile img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .tile:hover img { transform: scale(1.05); }

        .tile::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,255,204,0) 100%);
            transition: background 0.3s;
            pointer-events: none;
        }
        .tile:hover::after {
            background: linear-gradient(0deg, rgba(0,0,0,0.3) 0%, rgba(0,255,204,0.08) 100%);
        }

        /* --- LANDSCAPE-DOMINANT MASONRY (v2.1) --- */
        /*
         * Landscape tiles: full column width, 16:9 — the heroes.
         * Portrait tiles:  55% column width, 9:16 — accent thumbnails.
         *   They sit right-aligned within their column cell so they
         *   don't look centred/floating. Two portrait tiles can sit
         *   side-by-side in a landscape-width slot via flex pairing in JS.
         */
        .masonry-grid {
            display: flex;
            align-items: flex-start;
            gap: 3px;
            margin: 0 auto 44px auto;
        }

        .masonry-column {
            min-width: 0;
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* PicLumen-style uneven column starts */
        .masonry-column:nth-child(2) { padding-top: 26px; }
        .masonry-column:nth-child(3) { padding-top: 10px; }
        .masonry-column:nth-child(4) { padding-top: 34px; }
        .masonry-column:nth-child(5) { padding-top: 18px; }
        .masonry-column:nth-child(6) { padding-top: 42px; }
        .masonry-column:nth-child(7) { padding-top: 8px; }

        /* Landscape: full width hero tile */
        .masonry-grid .tile.tile-L {
            display: block;
            width: 100%;
            height: auto;
            margin: 0;
            flex: 0 0 auto;
            aspect-ratio: 16 / 9;
        }

        /* Portrait: full width when in portrait-only mode (Mobile filter) */
        .masonry-grid .tile.tile-P {
            display: block;
            width: 100%;
            height: auto;
            margin: 0;
            flex: 0 0 auto;
            aspect-ratio: 9 / 16;
        }

        /* Portrait pair wrapper — two portraits sit side-by-side */
        .masonry-grid .portrait-pair {
            display: flex;
            gap: 3px;
            width: 100%;
            flex: 0 0 auto;
        }

        /* Each portrait in a pair takes half the column width */
        .masonry-grid .portrait-pair .tile.tile-P {
            flex: 1 1 0;
            min-width: 0;
            width: 0; /* flex will size it */
            height: auto;
            aspect-ratio: 9 / 16;
            /* Cap height so a lone portrait pair doesn't tower too tall */
            max-height: 260px;
            object-fit: cover;
        }

        /* Solo portrait (unpaired — odd one out) — sits at 55% width, right-aligned */
        .masonry-grid .tile.tile-P.portrait-solo {
            display: block;
            width: 55%;
            height: auto;
            margin: 0 0 0 auto;
            flex: 0 0 auto;
            aspect-ratio: 9 / 16;
            max-height: 240px;
        }

        .masonry-grid .tile img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Phone only (≤620px): single column, full width ── */
        @media (max-width: 620px) {
            .archive-wrapper { padding: 0 6px; }
            .masonry-grid { display: block; }
            .masonry-column { padding-top: 0 !important; gap: 6px; }
            .masonry-grid .tile.tile-L { width: 100%; aspect-ratio: 16 / 9; max-height: none; }
            .masonry-grid .portrait-pair { gap: 3px; }
            .masonry-grid .portrait-pair .tile.tile-P { max-height: 200px; }
            .masonry-grid .tile.tile-P.portrait-solo { width: 55%; max-height: 200px; }
            .filter-nav  { gap: 12px; }
            .filter-btn  { font-size: 10px; letter-spacing: 1px; }
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .lb-img-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #lb-image {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto;
            object-fit: contain;
            border: 1px solid #1a1a1a;
            user-select: none;
            pointer-events: none;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            display: block;
            opacity: 0;
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: opacity 0.3s ease;
            will-change: opacity, transform, filter;
        }
        #lb-image.visible { opacity: 1; }

        .lb-img-container.portal-flip-active {
            perspective: 1400px;
        }

        #lb-image.portal-flip-out {
            animation: portalOld .5s ease forwards;
        }

        #lb-image.portal-flip-in {
            animation: portalNew .72s ease forwards;
        }

        /* Exact Effect 9 ring cloned from x2.html */
        .fx-layer{
            position:absolute;inset:0;
            pointer-events:none;
            z-index:15;
            display:none;
        }
        .fx-layer.show{display:block}

        .portal-layer.show{
            display:block;
            opacity:0;
            background:
                radial-gradient(circle, transparent 0 31%, rgba(0,255,230,.96) 32%, rgba(255,43,214,.42) 35%, transparent 39%),
                conic-gradient(from 0deg,transparent,rgba(0,255,230,.55),transparent,rgba(255,43,214,.5),transparent);
            mask:radial-gradient(circle,transparent 0 24%,#000 25% 43%,transparent 44%);
            -webkit-mask:radial-gradient(circle,transparent 0 24%,#000 25% 43%,transparent 44%);
            animation:portalSpin .86s ease forwards;
        }
        .fx-portal #lb-image.portal-flip-out{animation:portalOld .5s ease forwards}
        .fx-portal #lb-image.portal-flip-in{animation:portalNew .72s ease forwards}
        @keyframes portalSpin{0%{opacity:0;transform:rotate(0) scale(.5)}35%{opacity:1}100%{opacity:0;transform:rotate(540deg) scale(1.15)}}
        @keyframes portalOld{to{opacity:0;transform:rotateY(-65deg) scale(.86);filter:brightness(.35)}}
        @keyframes portalNew{from{opacity:0;transform:rotateY(65deg) scale(.86);filter:brightness(.45) saturate(1.5)}to{opacity:1;transform:rotateY(0) scale(1);filter:none}}

        #lb-loading {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%,-50%);
            font-size: 10px;
            letter-spacing: 4px;
            color: rgba(0,255,204,0.75);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        #lb-loading.visible { opacity: 1; }

        /* ── Floating frosted-glass dock ── */
        #lb-dock {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1010;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 18px;
            background: rgba(10,12,18,0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0,255,230,0.18);
            border-radius: 60px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
        }

        .dock-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.18s;
            flex-shrink: 0;
            border-radius: 50%;
        }
        .dock-btn:hover { color: #fff; transform: scale(1.12); }
        .dock-btn svg { width: 44px; height: 44px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        #lb-prev, #lb-next { color: rgba(255,255,255,0.9); }

        #lb-counter {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
            padding: 0 8px;
            min-width: 64px;
            text-align: center;
        }

        #lb-download {
            display: flex;
            align-items: center;
            padding: 6px;
            border-radius: 50%;
            transition: opacity 0.2s, transform 0.18s;
            flex-shrink: 0;
            opacity: 0.85;
        }
        #lb-download:hover { opacity: 1; transform: scale(1.12); }
        #lb-download svg { width: 44px; height: 44px; }

        .dock-divider {
            width: 1px; height: 28px;
            background: rgba(0,255,230,0.15);
            flex-shrink: 0;
            margin: 0 4px;
        }

        #scroll-top {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 500;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,255,204,0.3);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            width: 50px; height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border-radius: 50%;
        }
        #scroll-top.visible { opacity: 1; pointer-events: all; }
        #scroll-top:hover { border-color: var(--cyan); background: rgba(0,255,204,0.1); transform: translateY(-5px); }

        .filter-btn:focus-visible, .tile:focus-visible,
        .dock-btn:focus-visible, #lb-download:focus-visible, #scroll-top:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            .tile, .tile img, #lb-image, #lb-portal, .dock-btn, #lb-download, #scroll-top, #lb-loading {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Nav popup — frosted glass, mid-screen, no blackout -->
    <div id="nav-popup" role="dialog" aria-label="Site navigation" aria-hidden="true">
        <a class="nav-popup-item" href="https://links.electroscapex.com/" target="_blank" rel="noopener noreferrer">Weblinks</a>
        <a class="nav-popup-item" href="https://electroscapex.com/tv.html" target="_blank" rel="noopener noreferrer">TV</a>
        <a class="nav-popup-item" href="https://imagevault.electroscapex.com/" target="_blank" rel="noopener noreferrer">Image Vault</a>
        <a class="nav-popup-item" href="https://electroscapex.com" target="_blank" rel="noopener noreferrer">Electroscape</a>
        <a class="nav-popup-item" href="mobile3.html" rel="noopener noreferrer">MX</a>
    </div>

    <header class="site-header">
        <!-- Burger: circle, cyan border, matches mobile2 style -->
        <button id="nav-burger" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-popup">
            <span></span><span></span><span></span>
        </button>

        <!-- Wordmark: each letter fades in with stagger -->
        <a class="site-title" href="https://electroscapex.com" target="_blank" rel="noopener" aria-label="Electroscape home">
            <span>E</span><span>L</span><span>E</span><span>C</span><span>T</span><span>R</span><span>O</span><span>S</span><span>C</span><span>A</span><span>P</span><span>E</span>
        </a>

        <div class="site-version" aria-label="Site version">v2.4</div>
    </header>

    <div class="sticky-container">
        <div class="filter-nav" role="group" aria-label="Filter wallpapers">
            <!-- ALL -->
            <button class="filter-btn active" data-filter="all" type="button" aria-label="Show all wallpapers" aria-pressed="true">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                ALL
            </button>
            <!-- WIDESCREEN -->
            <button class="filter-btn" data-filter="widescreen" type="button" aria-label="Show widescreen wallpapers" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="5" width="20" height="13" rx="2"/>
                    <path d="M8 21h8M12 18v3" stroke-linecap="round"/>
                </svg>
                WIDESCREEN
            </button>
            <!-- MOBILE -->
            <button class="filter-btn" data-filter="mobile" type="button" aria-label="Show mobile wallpapers" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="7" y="2" width="10" height="20" rx="2"/>
                    <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
                </svg>
                MOBILE
            </button>
        </div>
    </div>

    <div class="archive-wrapper" id="main-content">
        <div id="loading">LOADING ARCHIVE…</div>
    </div>

    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Wallpaper preview" aria-hidden="true">
        <div class="lb-img-container" id="touch-zone">
            <img id="lb-image" src="" alt="Wallpaper">
            <div class="fx-layer portal-layer" id="lb-portal" aria-hidden="true"></div>
            <div id="lb-loading" aria-live="polite">LOADING…</div>
        </div>
        <div id="lb-dock">
            <button class="dock-btn" id="lb-prev" title="Previous" type="button" aria-label="Previous image">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span id="lb-counter"></span>
            <div class="dock-divider"></div>
            <a id="lb-download" href="" download title="Download" aria-label="Download current wallpaper">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="11" fill="var(--cyan)" stroke="none"/>
                    <path d="M12 6v9M8 11l4 4 4-4" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M7 18h10" stroke="#000" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                </svg>
            </a>
            <div class="dock-divider"></div>
            <button class="dock-btn" id="lb-close" title="Close" type="button" aria-label="Close preview">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="dock-btn" id="lb-next" title="Next" type="button" aria-label="Next image">
                <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <button id="scroll-top" title="Back to top" type="button" aria-label="Back to top">↑</button>

    <script>
        const THUMB_EXT         = '.webp';
        const FULLRES_EXT       = '.jpg';
        const FULLRES_MAX_WIDTH = { L: 1344, P: 500 };

        let allItems = [], landscapeNums = [], portraitNums = [];
        let currentFilter = 'all', cacheVersion = '';

        const content   = document.getElementById('main-content');
        const lightbox  = document.getElementById('lightbox');
        const touchZone = document.getElementById('touch-zone');
        const lbImage   = document.getElementById('lb-image');
        const lbPortal  = document.getElementById('lb-portal');
        const lbCounter = document.getElementById('lb-counter');
        const lbDownload= document.getElementById('lb-download');
        const lbLoading = document.getElementById('lb-loading');

        fetch('manifest.json')
            .then(r => r.json())
            .then(data => {
                landscapeNums = data.landscape;
                portraitNums  = data.portrait;
                cacheVersion  = '?v=' + (data.lastUpdated || Date.now());
                buildAllItems();
                buildGallery();
                setupFilters();
            })
            .catch(err => {
                console.error(err);
                const el = document.getElementById('loading');
                el.textContent = 'ERROR LOADING MANIFEST';
                el.style.color = '#ff4444';
            });

        function buildAllItems() {
            allItems = [];
            const max = Math.max(landscapeNums.length, portraitNums.length);
            for (let i = 0; i < max; i++) {
                if (i < landscapeNums.length) allItems.push({ type: 'L', number: landscapeNums[i] });
                if (i < portraitNums.length)  allItems.push({ type: 'P', number: portraitNums[i] });
            }
        }

        function getFilteredItems() {
            if (currentFilter === 'widescreen') return allItems.filter(i => i.type === 'L');
            if (currentFilter === 'mobile')     return allItems.filter(i => i.type === 'P');
            return allItems;
        }

        // ── GALLERY: Landscape-dominant masonry (v2.1 Option B) ──
        // Landscape tiles are full-column heroes.
        // Portrait tiles are paired side-by-side (two per row) as accents.
        // Odd portrait left over after pairing gets solo treatment (55% width).
        // Packer weights: L = 0.56 units (short), portrait-pair = 1.0 unit (medium).
        // This keeps landscape tiles visually dominant throughout.
        function getMasonryColumnCount() {
            const w = window.innerWidth;
            if (w <= 620)  return 1;   // phone
            if (w <= 820)  return 3;   // small tablet — fewer cols so landscape tiles are bigger
            if (w <= 1100) return 4;   // tablet / small laptop
            if (w <= 1499) return 4;   // mid-range
            if (w <= 1799) return 5;   // large desktop
            return 6;                  // ultra-wide (≥1800px)
        }

        function buildGallery() {
            content.innerHTML = '';
            const items = getFilteredItems();

            if (!items.length) {
                const m = document.createElement('div');
                m.style.cssText = 'text-align:center;padding:60px;color:#666;font-size:10px;letter-spacing:4px';
                m.textContent = 'NO IMAGES IN THIS CATEGORY';
                content.appendChild(m);
                return;
            }

            const colCount = getMasonryColumnCount();
            const g = document.createElement('div');
            g.className = 'masonry-grid';

            const cols = Array.from({ length: colCount }, () => {
                const col = document.createElement('div');
                col.className = 'masonry-column';
                g.appendChild(col);
                return col;
            });

            const heights = new Array(colCount).fill(0);

            // ── Portrait-only mode (Mobile filter) ───────────────────
            // Skip pair/solo logic entirely — each portrait fills its
            // column at full width, shortest-column packed. Clean grid.
            const portraitOnly = items.every(i => i.type === 'P');
            if (portraitOnly) {
                items.forEach((item, idx) => {
                    const tile = makeTile(item, idx, items);
                    const target = heights.indexOf(Math.min(...heights));
                    cols[target].appendChild(tile);
                    heights[target] += 1.78; // full portrait weight
                });
                content.appendChild(g);
                return;
            }

            // ── Mixed / Landscape-dominant mode (All / Widescreen) ───
            const landscapes = [];
            const portraits  = [];
            items.forEach((item, idx) => {
                if (item.type === 'L') landscapes.push({ item, idx });
                else                   portraits.push({ item, idx });
            });

            // Pair portraits into groups of 2; solo if odd
            const portraitSlots = [];
            for (let i = 0; i < portraits.length; i += 2) {
                if (i + 1 < portraits.length) {
                    portraitSlots.push({ kind: 'pair', a: portraits[i], b: portraits[i + 1] });
                } else {
                    portraitSlots.push({ kind: 'solo', a: portraits[i] });
                }
            }

            // Merge: L, L, P-pair, L, L, P-pair …
            const schedule = [];
            let li = 0, pi = 0;
            while (li < landscapes.length || pi < portraitSlots.length) {
                for (let k = 0; k < 2 && li < landscapes.length; k++) {
                    schedule.push({ kind: 'landscape', data: landscapes[li++] });
                }
                if (pi < portraitSlots.length) {
                    schedule.push(portraitSlots[pi++]);
                }
            }

            schedule.forEach(slot => {
                const target = heights.indexOf(Math.min(...heights));

                if (slot.kind === 'landscape') {
                    const { item, idx } = slot.data;
                    const tile = makeTile(item, idx, items);
                    cols[target].appendChild(tile);
                    heights[target] += 0.56;

                } else if (slot.kind === 'pair') {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'portrait-pair';
                    const tA = makeTile(slot.a.item, slot.a.idx, items);
                    const tB = makeTile(slot.b.item, slot.b.idx, items);
                    wrapper.appendChild(tA);
                    wrapper.appendChild(tB);
                    cols[target].appendChild(wrapper);
                    heights[target] += 1.0;

                } else if (slot.kind === 'solo') {
                    const { item, idx } = slot.a;
                    const tile = makeTile(item, idx, items);
                    tile.classList.add('portrait-solo');
                    cols[target].appendChild(tile);
                    heights[target] += 0.75;
                }
            });

            content.appendChild(g);
        }

        function makeTile(item, globalIdx, items) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${item.type}`;
            tile.setAttribute('role', 'button');
            tile.setAttribute('tabindex', '0');
            tile.setAttribute('aria-label', `Open ${item.type === 'L' ? 'widescreen' : 'mobile'} wallpaper ${item.number}`);

            const img = document.createElement('img');
            img.decoding      = 'async';
            img.fetchPriority = globalIdx < 2 ? 'high' : 'auto';
            img.alt           = `${item.type === 'L' ? 'Widescreen' : 'Mobile'} Wallpaper ${item.number}`;

            // ── Robust loader: retry up to 3× with exponential backoff ──
            // Never falls back to the black 00.jpg on a transient network hiccup.
            // Only marks tile missing after all retries are exhausted.
            const thumbSrc = `./wallpapers/${item.type === 'L' ? 'LT' : 'PT'}${item.number}${THUMB_EXT}${cacheVersion}`;
            let attempts = 0;
            const MAX_ATTEMPTS = 3;
            const RETRY_DELAYS = [800, 2000, 4000]; // ms

            function tryLoad() {
                attempts++;
                // Force a fresh fetch on retries by busting any browser negative-cache
                img.src = attempts === 1
                    ? thumbSrc
                    : thumbSrc + (thumbSrc.includes('?') ? '&' : '?') + '_r=' + attempts;
            }

            img.onload = () => {
                // Successful load — clear any retry state
                img.onerror = null;
            };

            img.onerror = () => {
                if (attempts < MAX_ATTEMPTS) {
                    const delay = RETRY_DELAYS[attempts - 1] || 4000;
                    setTimeout(tryLoad, delay);
                } else {
                    // All retries exhausted — mark as missing but DON'T swap to black tile
                    // Just hide the broken icon and dim the tile so it's visually clear
                    img.onerror = null;
                    img.style.display = 'none';
                    tile.classList.add('tile-missing');
                    tile.style.cursor = 'default';
                    tile.style.background = '#0d0d0d';
                    tile.style.border = '1px solid #1a1a1a';
                    // Small label so it's obvious it's a missing tile not blank space
                    const miss = document.createElement('span');
                    miss.style.cssText = 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.12);pointer-events:none;';
                    miss.textContent = '—';
                    tile.appendChild(miss);
                    tile.onclick = null;
                }
            };

            // Use IntersectionObserver for lazy loading instead of loading="lazy"
            // which can be over-aggressive and cause blanking on scroll
            if (globalIdx < 8) {
                // First 8 tiles load immediately (above fold)
                tryLoad();
            } else {
                // Remaining tiles load when they enter the viewport
                img.src = ''; // placeholder
                const observer = new IntersectionObserver((entries, obs) => {
                    if (entries[0].isIntersecting) {
                        obs.disconnect();
                        tryLoad();
                    }
                }, { rootMargin: '400px' }); // start loading 400px before visible
                observer.observe(tile);
            }

            const open = () => {
                if (tile.classList.contains('tile-missing')) return;
                if (!img.complete || img.naturalWidth === 0) return;
                openLightbox(globalIdx, items);
            };
            tile.addEventListener('click', open);
            tile.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });

            tile.appendChild(img);
            return tile;
        }

        // ── LIGHTBOX ──────────────────────────────────────────────
        let currentItems = [], currentIdx = 0, lbToken = 0, transitioning = false;

        function getFullResPath(item) {
            return `./wallpapers/${item.type === 'L' ? 'L' : 'P'}${item.number}${FULLRES_EXT}${cacheVersion}`;
        }

        function updateCounter() {
            lbCounter.textContent =
                `${String(currentIdx + 1).padStart(2,'0')} / ${String(currentItems.length).padStart(2,'0')}`;
        }

        function clearPortalFlipClasses() {
            touchZone.classList.remove('portal-flip-active', 'fx-portal');
            lbPortal.classList.remove('show');
            lbImage.classList.remove('portal-flip-out', 'portal-flip-in');
        }

        function preloadNeighborImages(idx) {
            [-1, 1].forEach(d => {
                const n = currentItems[idx + d];
                if (n) new Image().src = getFullResPath(n);
            });
        }

        function loadImage(idx) {
            if (idx < 0 || idx >= currentItems.length || transitioning) return;
            transitioning = true;

            const firstLoad = !lbImage.src || !lbImage.getAttribute('src');
            const item  = currentItems[idx];
            const path  = getFullResPath(item);
            const token = ++lbToken;

            currentIdx = idx;
            updateCounter();

            lbImage.style.maxWidth = `min(100%, ${FULLRES_MAX_WIDTH[item.type]}px)`;
            lbDownload.href = path;
            if (firstLoad) lbLoading.classList.add('visible');
            else lbLoading.classList.remove('visible');

            const p = new Image();
            p.onload = () => {
                if (token !== lbToken) return;

                if (firstLoad) {
                    clearPortalFlipClasses();
                    lbImage.src = path;
                    lbLoading.classList.remove('visible');
                    requestAnimationFrame(() => {
                        lbImage.classList.add('visible');
                        transitioning = false;
                        preloadNeighborImages(idx);
                    });
                    return;
                }

                clearPortalFlipClasses();
                touchZone.classList.add('portal-flip-active', 'fx-portal');
                lbPortal.classList.add('show');
                lbImage.classList.add('visible', 'portal-flip-out');

                setTimeout(() => {
                    if (token !== lbToken) return;
                    lbImage.src = path;
                    lbLoading.classList.remove('visible');
                    lbImage.classList.remove('portal-flip-out');
                    lbImage.classList.add('portal-flip-in');
                }, 420);

                setTimeout(() => {
                    if (token !== lbToken) return;
                    clearPortalFlipClasses();
                    lbImage.classList.add('visible');
                    transitioning = false;
                    preloadNeighborImages(idx);
                }, 980);
            };
            p.onerror = () => {
                if (token !== lbToken) return;
                clearPortalFlipClasses();
                lbImage.classList.remove('visible');
                setTimeout(() => {
                    lbImage.src = './wallpapers/00.jpg';
                    lbLoading.classList.remove('visible');
                    requestAnimationFrame(() => {
                        lbImage.classList.add('visible');
                        transitioning = false;
                    });
                }, 200);
            };
            p.src = path;
        }

        function changeImage(d) { loadImage(currentIdx + d); }

        function openLightbox(idx, items) {
            if (!items.length) return;
            currentItems = items;
            transitioning = false;
            lightbox.style.display = 'flex';
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            lbImage.classList.remove('visible');
            lbImage.src = '';
            loadImage(Math.max(0, Math.min(idx, items.length - 1)));
        }

        function closeLightbox() {
            lbToken++; transitioning = false;
            clearPortalFlipClasses();
            lbLoading.classList.remove('visible');
            lightbox.style.display = 'none';
            lightbox.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            lbImage.classList.remove('visible');
            lbCounter.textContent = '';
            setTimeout(() => { lbImage.src = ''; }, 300);
        }

        // ── FILTERS ───────────────────────────────────────────────
        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    buildGallery();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (lightbox.style.display !== 'flex') buildGallery();
            }, 180);
        });

        // ── SCROLL TOP ────────────────────────────────────────────
        const scrollBtn = document.getElementById('scroll-top');
        window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 400));
        scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // ── KEYBOARD ──────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (lightbox.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft')  changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
            if (e.key === 'Escape')     closeLightbox();
        });

        // ── TOUCH SWIPE (mobile / tablet) ─────────────────────────
        // Swipe left → next image, swipe right → previous image.
        // Only fires if horizontal movement clearly dominates vertical
        // (prevents clash with page scroll). Minimum 44px to trigger.
        (function () {
            let startX = 0, startY = 0, dragging = false;
            const MIN_SWIPE = 44;

            touchZone.addEventListener('touchstart', e => {
                if (lightbox.style.display !== 'flex') return;
                startX   = e.touches[0].clientX;
                startY   = e.touches[0].clientY;
                dragging = true;
            }, { passive: true });

            touchZone.addEventListener('touchend', e => {
                if (!dragging || lightbox.style.display !== 'flex') return;
                dragging = false;
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                // Only treat as a swipe if horizontal movement dominates
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > MIN_SWIPE) {
                    changeImage(dx < 0 ? 1 : -1);
                }
            }, { passive: true });

            // Cancel drag if touch is interrupted
            touchZone.addEventListener('touchcancel', () => { dragging = false; }, { passive: true });
        })();

        // ── DOCK ──────────────────────────────────────────────────
        document.getElementById('lb-close').addEventListener('click', closeLightbox);
        document.getElementById('lb-prev').addEventListener('click', () => changeImage(-1));
        document.getElementById('lb-next').addEventListener('click', () => changeImage(1));
        document.getElementById('touch-zone').addEventListener('click', e => {
            if (e.target === document.getElementById('touch-zone')) closeLightbox();
        });
        let lastWheelNavAt = 0;
        const WHEEL_NAV_COOLDOWN_MS = 220;
        const WHEEL_MIN_DELTA = 12;
        lightbox.addEventListener('wheel', e => {
            if (lightbox.style.display !== 'flex') return;
            e.preventDefault();
            e.stopPropagation();
            if (Math.abs(e.deltaY) < WHEEL_MIN_DELTA) return;
            const now = Date.now();
            if (now - lastWheelNavAt < WHEEL_NAV_COOLDOWN_MS) return;
            lastWheelNavAt = now;
            changeImage(e.deltaY > 0 ? 1 : -1);
        }, { passive: false });

        // ── NAV BURGER POPUP ──────────────────────────────────────
        (function () {
            const burger  = document.getElementById('nav-burger');
            const popup   = document.getElementById('nav-popup');
            let popTimer  = null;

            function openNav() {
                popup.classList.add('is-open');
                burger.classList.add('is-open');
                burger.setAttribute('aria-expanded', 'true');
                popup.setAttribute('aria-hidden', 'false');
                // Auto-close after 6s (matching mobile2 behaviour)
                clearTimeout(popTimer);
                popTimer = setTimeout(closeNav, 6000);
            }

            function closeNav() {
                popup.classList.remove('is-open');
                burger.classList.remove('is-open');
                burger.setAttribute('aria-expanded', 'false');
                popup.setAttribute('aria-hidden', 'true');
                clearTimeout(popTimer);
            }

            burger.addEventListener('click', e => {
                e.stopPropagation();
                popup.classList.contains('is-open') ? closeNav() : openNav();
            });

            // Click anywhere outside popup closes it
            document.addEventListener('click', e => {
                if (!popup.contains(e.target) && e.target !== burger) closeNav();
            });

            // Close on Escape
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeNav();
            });

            // Reset auto-close timer if user hovers popup
            popup.addEventListener('mouseenter', () => clearTimeout(popTimer));
            popup.addEventListener('mouseleave', () => {
                popTimer = setTimeout(closeNav, 3000);
            });
        })();

        // ── FILTER ICON TABS — aria-pressed sync ─────────────────
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.setAttribute('aria-pressed', 'false'));
                btn.setAttribute('aria-pressed', 'true');
            });
        });

        console.log('Gallery initialized');
    </script>
</body>
</html>
