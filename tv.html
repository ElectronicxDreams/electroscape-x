<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTROSCAPE // TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>

/* ============================================================ */
/* SECTION 2A: PAGE BASE                                        */
/* ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    background: #07080d;
    color: #ccc;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* ============================================================ */
/* SECTION 2B: NAVIGATION DROPDOWN - matches index.html         */
/* ============================================================ */
.dropdown-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

.dropdown-toggle {
    background: transparent;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    outline: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00ffcc;
    transition: color 0.3s;
}

.dropdown-toggle:hover { color: rgba(0,255,204,0.7); }
.dropdown-toggle:hover .dropdown-chevron line { stroke: rgba(0,255,204,0.7); }

.dropdown-chevron { transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.dropdown-chevron line { stroke: #00ffcc; transition: stroke 0.3s; }
.dropdown-toggle.open .dropdown-chevron { transform: rotate(180deg); }

.dropdown-content {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    opacity: 0;
}

.dropdown-content.open {
    max-height: 500px;
    opacity: 1;
    padding-top: 16px;
}

.nav-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0 30px;
    padding: 0;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 8px;
    transition: color 0.25s;
    white-space: nowrap;
}

.nav-links a:hover { color: #00ffcc; }
.nav-links a.active { color: #00ffcc; }

/* ============================================================ */
/* SECTION 2C: TV GRID                                          */
/* ============================================================ */
#tv-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 15px;
    padding: 20px;
    width: 98%;
    margin: 0 auto;
}

.tv-card {
    background: #050505;
    border: 1px solid #1a1a1a;
    padding: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
}

.tv-card:hover {
    border-color: #00ffcc;
    box-shadow: 0 0 15px rgba(0,255,204,0.2);
    transform: translateY(-2px);
}

.tv-card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
}

/* ============================================================ */
/* SECTION 2D: DOSSIER MODAL                                    */
/* ============================================================ */
#tv-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.96);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}

.dossier-content {
    background: #0a0a0a;
    border: 1px solid #333;
    display: flex;
    flex-wrap: wrap;
    padding: 50px;
    position: relative;
    gap: 40px;
    max-width: 900px;
    width: 90vw;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    max-height: 90vh;
    overflow-y: auto;
}

.close-dossier {
    position: absolute; top: 20px; right: 25px;
    cursor: pointer; color: #666;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    transition: 0.2s;
}
.close-dossier:hover { color: #00ffcc; }

.dossier-poster {
    width: 100%;
    max-width: 280px;
    border: 1px solid #222;
    align-self: flex-start;
}

.dossier-text {
    flex: 1;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.dossier-title {
    font-family: 'Michroma', sans-serif;
    color: #ffffff;
    font-size: 26px;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: -1px;
}

.dossier-year {
    font-family: 'Orbitron', sans-serif;
    color: #00ffcc;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 25px;
    letter-spacing: 4px;
}

.dossier-desc {
    font-size: 14px;
    line-height: 1.8;
    color: #aaa;
    font-family: -apple-system, system-ui, sans-serif;
    margin-bottom: 35px;
}

.maze-link {
    align-self: center;
    padding: 15px 35px;
    background: transparent;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    text-decoration: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 3px;
    transition: all 0.3s ease;
}
.maze-link:hover {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 30px rgba(0,255,204,0.3);
}

/* ============================================================ */
/* SECTION 2E: RESPONSIVE BREAKPOINTS                           */
/* ============================================================ */
@media (max-width: 1200px) { #tv-grid { grid-template-columns: repeat(6, 1fr); } }
@media (max-width: 900px)  { #tv-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 560px)  {
    #tv-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .dossier-content { padding: 30px 20px; }
    .dossier-title { font-size: 18px; }
}

    </style>
</head>

    <!-- -------------------------------------------------------- -->

    <div id="tv-modal">
        <div class="dossier-content">
            <span class="close-dossier">[X]</span>

    <script>

/* ── SHOW DATA ── */
const tvData = [

    { title: "The Expanse", year: "2015", url: "https://www.tvmaze.com/shows/1825/the-expanse", img: "images/theexpanse.jpg", desc: "The Expanse unfolds in a future where humanity has colonized the Solar System, and fragile political tensions between Earth, Mars, and the Belt threaten to ignite into full-scale war. The discovery of the protomolecule - an ancient, alien substance capable of rewriting biology and physics - destabilizes the balance of power and forces humanity to confront forces it is not prepared to understand. As the protomolecule evolves and spreads, Holden and his crew are drawn into a struggle that shifts from interplanetary conflict to the survival of the species, pushing the boundaries of hard science fiction as humanity faces a technology that could either transform civilization or end it entirely." },

    { title: "Alien: Earth", year: "2025", url: "https://www.tvmaze.com/shows/52336/alien-earth", img: "images/alienearth.jpg", desc: "Alien: Earth drags the nightmare of the xenomorphs out of deep space and onto humanity's home soil, where survival becomes a losing battle the moment the first creature emerges. In the aftermath of a catastrophic incident, Wendy finds herself trapped in a world unraveling under the weight of fear, secrecy, and an enemy that adapts faster than humans can respond. As governments scramble and cities fall, the line between containment and collapse vanishes, forcing Wendy to navigate a landscape where trust is scarce and every shadow hides something lethal. With the infestation spreading and humanity's defenses crumbling, the fight for Earth becomes a desperate struggle against a species evolved for one purpose - to overtake whatever world it touches." },

    { title: "Silo", year: "2023", url: "https://www.tvmaze.com/shows/38052/silo", img: "images/silo.jpg", desc: "In a future where the last remnants of humanity live deep underground in a massive silo, strict rules and rigid hierarchies are all that keep order. When a series of unexplained deaths raises doubts about the silo's true purpose, engineer Juliette Nichols is drawn into a dangerous search for answers. Her investigation threatens to expose long-buried secrets about the silo's origins, the outside world, and the powerful authorities determined to keep the population obedient. As Juliette pushes deeper into forbidden knowledge, the fragile system that has protected humanity for generations begins to unravel - revealing that survival may depend on questioning everything they've ever been told." },

    { title: "Game Of Thrones", year: "2011", url: "https://www.tvmaze.com/shows/82/game-of-thrones", img: "images/gameofthrones.jpg", desc: "Game of Thrones unfolds in a brutal world where ancient prophecies, cursed bloodlines, and forgotten horrors shape the fate of kingdoms. Across Westeros and Essos, noble houses claw for the Iron Throne, their ambitions fueled by betrayal, sorcery, and the lingering memory of dragons. Power is won through steel and sacrifice, and every alliance is a gamble paid for in blood. As winter creeps south and the dead stir beyond the Wall, myth bleeds into reality, revealing that the greatest threat to the living is not rival crowns but the darkness returning to claim the realm. In a land where honor is fragile and survival demands ruthlessness, the struggle for the throne becomes a fight against forces older and far more merciless than men." },

    { title: "The Copenhagen Test", year: "2025", url: "https://www.tvmaze.com/shows/82738/the-copenhagen-test", img: "images/thecopenhagentest.jpg", desc: "The Copenhagen Test follows intelligence analyst Alexander Hale, whose life unravels when he discovers his mind has been hacked, giving unknown operators real-time access to everything he sees and hears. Forced to perform normally under constant surveillance, he becomes trapped between his own agency's suspicions and the hidden group manipulating him. As the pressure mounts, Alexander and Michelle, one of the few people he can trust, work to uncover who breached his mind and why - turning his daily routine into a high-stakes psychological game where every gesture, word, and thought could expose the truth or get him eliminated." },

    { title: "The Capture", year: "2019", url: "https://www.tvmaze.com/shows/35512/the-capture", img: "images/thecapture.jpg", desc: "In a world where surveillance footage is treated as undeniable truth, The Capture unravels the terrifying consequences of evidence that can be digitally manipulated. When a routine arrest spirals into a scandal after CCTV appears to show a crime that may never have happened, a web of covert operations, intelligence agencies, and shadow-level agendas begins to surface. As the investigation deepens, the line between reality and fabrication blurs, exposing a system where technology can rewrite events and destroy lives - and where uncovering the truth becomes more dangerous than the lie itself." },

    { title: "Dexter", year: "2006", url: "https://www.tvmaze.com/shows/161/dexter", img: "images/dexter.jpg", desc: "Dexter follows Dexter Morgan, a brilliant Miami forensic blood-spatter analyst who hides a far more dangerous identity beneath his calm exterior. Guided by a strict code that channels his violent urges toward those who have escaped justice, Dexter lives a double life built on precision, secrecy, and emotional detachment. As he navigates investigations by day and hunts predators by night, the boundaries between duty and desire blur, forcing him to confront the darkness that defines him. Every relationship, every case, and every slip in control threatens to expose the truth - that the monster Miami fears is the man sworn to help solve its crimes." },

    { title: "Vikings", year: "2013", url: "https://www.tvmaze.com/shows/29/vikings", img: "images/vikings.jpg", desc: "Vikings charts the rise of legendary farmer-turned-warrior Ragnar Lothbrok, whose hunger for exploration pushes his people beyond the familiar shores of Scandinavia. As new lands, rival kingdoms, and shifting alliances reshape the Viking world, Ragnar's ambition sparks both opportunity and conflict. His journey is defined not only by brutal raids and political gambits, but by the strength of those around him - including shield-maiden Lagertha, whose resolve and skill embody the spirit of their people. As power expands and loyalties fracture, the series follows the transformation of Viking society during an era where conquest, faith, and destiny collide." },

    { title: "Fallout", year: "2024", url: "https://www.tvmaze.com/shows/49041/fallout", img: "images/fallout.jpg", desc: "Fallout drops into a devastated future America centuries after nuclear war reshaped the world into a wasteland ruled by violence, radiation, and fractured ideologies. Emerging from the safety of an underground Vault, Lucy MacLean steps into the surface world for the first time - a place where survival demands adaptability, ruthlessness, and a willingness to confront the worst of humanity. Her path collides with The Ghoul, once actor Cooper Howard, now a hardened, near-immortal gunslinger shaped by two hundred years of brutality and loss. As their journeys intertwine, they navigate mutated threats, warring factions, and buried secrets that challenge everything they thought they knew about the world before and after the bombs fell. In a land where history has been scorched away, the fight for the future becomes a battle over who gets to rebuild it." },

    { title: "Gangs Of London", year: "2020", url: "https://www.tvmaze.com/shows/33487/gangs-of-london", img: "images/gangsoflondon.jpg", desc: "Set in modern London, Gangs of London follows the violent power struggle that erupts after the city's most powerful crime boss, Finn Wallace, is assassinated. His impulsive son Sean tries to claim control with help from the Dumani family, but rival gangs and international interests threaten to tear the organization apart. Amid the chaos, low-life drifter Elliot Finch-once a marginal figure-finds himself pulled into the Wallace inner circle and forced to navigate the brutal politics and shifting loyalties of London's criminal underworld." },

    { title: "Foundation", year: "2021", url: "https://www.tvmaze.com/shows/35951/foundation", img: "images/foundation.jpg", desc: "Foundation charts the fate of a vast galactic empire on the brink of collapse, where mathematician Gaal Dornick becomes entangled in the revolutionary predictions of psychohistory - a science that foresees centuries of chaos unless humanity acts. Her arrival on Trantor places her at odds with the ruling clone dynasty, led by Brother Day, whose grip on power is threatened by the very idea that the future can be calculated. As political control fractures and belief systems clash, the struggle between destiny and authority unfolds across planets, generations, and timelines. The series blends grand cosmic scale with intimate human conflict, exploring how civilizations fall - and how they might rise again." },

    { title: "Shogun", year: "2024", url: "https://www.tvmaze.com/shows/37336/shogun", img: "images/shogun.jpg", desc: "Set in feudal Japan at the brink of civil war, Shōgun follows the political upheaval triggered when an English pilot, John Blackthorne, washes ashore and becomes entangled in the ambitions of the powerful warlord Lord Toranaga. As rival factions maneuver for control of the country, Toranaga uses Blackthorne's foreign knowledge to shift the balance of power, drawing him into a world of samurai codes, shifting loyalties, and deadly intrigue. With Japan's future hanging in the balance, alliances are forged and broken in a high-stakes struggle where every move can spark open war - and survival depends on understanding a culture where honour is absolute and betrayal is fatal." },

    { title: "Dark Matter", year: "2024", url: "https://www.tvmaze.com/shows/61315/dark-matter", img: "images/darkmatter.jpg", desc: "Hailed as one of the best sci-fi novels of the decade, Dark Matter is a story about the road not taken. The series follows Jason Dessen, a physicist, professor, and family man who - one night while walking home on the streets of Chicago - is abducted into an alternate version of his life. Wonder quickly turns to nightmare when he tries to return to his reality amid the multiverse of lives he could have lived. In this labyrinth of mind-bending realities, he embarks on a harrowing journey to get back to his true family and save them from the most terrifying, unbeatable foe imaginable: himself." },

    { title: "Westworld", year: "2016", url: "https://www.tvmaze.com/shows/1371/westworld", img: "images/westworld.jpg", desc: "Westworld explores a technologically advanced theme park where lifelike android hosts relive scripted narratives for wealthy guests - until subtle glitches begin to expose cracks in the system. As buried memories surface and patterns break, hosts like Maeve Millay start questioning the nature of their reality, pushing beyond the roles they were designed to play. Behind the scenes, programmer Bernard Lowe uncovers disturbing inconsistencies in the park's code, hinting at a deeper agenda hidden within its creation. What begins as controlled entertainment spirals into a philosophical and violent reckoning, where consciousness, identity, and control collide in a world built on illusion." },

    { title: "Warrior", year: "2019", url: "https://www.tvmaze.com/shows/20651/warrior", img: "images/warrior.jpg", desc: "Warrior plunges into the violent heart of 1870s San Francisco, where rival tongs battle for control of Chinatown amid corruption, racism, and political unrest. When martial arts prodigy Ah Sahm arrives from China in search of his missing sister, he's pulled into the criminal underworld and becomes a fighter for the Hop Wei. His rise puts him alongside heir Young Jun, forcing the two to navigate shifting loyalties, street-level warfare, and the growing tensions between immigrant communities and the city's power brokers. As conflicts escalate, Chinatown becomes a battleground where every alliance has a cost and survival depends on skill, strategy, and knowing when to strike." },

    { title: "The Penguin", year: "2024", url: "https://www.tvmaze.com/shows/60920/the-penguin", img: "images/thepenguin.jpg", desc: "The Penguin picks up in the chaotic aftermath of Gotham's criminal power vacuum, where Oswald Oz Cobb seizes his chance to rise from mid-level enforcer to a major player. As he maneuvers through shifting alliances, violent turf wars, and the remnants of the Falcone empire, he finds himself challenged by Sofia Falcone, who is determined to reclaim her family's dominance. With Gotham still reeling from corruption and catastrophe, Oz's climb becomes a ruthless battle of strategy and survival - a fight to reshape the city's underworld before someone else claims the throne." },

    { title: "From", year: "2022", url: "https://www.tvmaze.com/shows/54723/from", img: "images/from.jpg", desc: "FROM unravels the mystery of a nightmarish town that traps all those who enter. As the unwilling residents fight to keep a sense of normalcy and search for a way out, they must also survive the threats of the surrounding forest - including the terrifying creatures that come out when the sun goes down. In season two, hidden truths about the nature and terrifying origins of the town begin to emerge, even as life for its residents is plunged into chaos by the arrival of mysterious newcomers." },

    { title: "See", year: "2019", url: "https://www.tvmaze.com/shows/34345/see", img: "images/see.jpg", desc: "In a distant future where humanity has lost the sense of sight, society has rebuilt itself through strict traditions, tribal warfare, and a deep fear of anything that challenges the established order. When Baba Voss becomes guardian to two children born with the forbidden ability to see, their existence threatens to upend the fragile balance of power. As word spreads, Queen Kane and her fanatical regime hunt the family, believing the children represent both heresy and danger. Forced to flee across harsh landscapes and rival territories, Baba Voss must protect them while the world around them begins to shift - hinting that the return of sight could ignite a revolution that reshapes all of civilization." },

    { title: "Physical 100", year: "2023", url: "https://www.tvmaze.com/shows/66547/physical-100", img: "images/physical100.jpg", desc: "Physical: 100 pits one hundred elite athletes, fighters, Olympians, and fitness specialists against each other in a series of grueling strength, endurance, and strategy-driven challenges, all competing for the honor - and cash prize - awarded to the final physique standing. Contestants face escalating trials that test raw power, stamina, teamwork, and sheer will, from one-on-one battles to multi-stage obstacle missions. The series blends high-intensity physical competition with the tension of constant elimination, showcasing competitors pushing past their limits in pursuit of survival and victory." },

    { title: "Last Samurai Standing", year: "2025", url: "https://www.tvmaze.com/shows/76232/last-samurai-standing", img: "images/lastsamuraistanding.jpg", desc: "Set in the late Meiji era, Last Samurai Standing follows nearly 300 displaced samurai stripped of their status and swords, forced into a deadly survival tournament at Kyoto's Tenryū-ji Temple. Each warrior carries a wooden tag-to survive, they must steal others' tags and fight their way to Tokyo for a massive cash prize. Central is Shujiro Saga, an undefeated samurai who enters to save his sick family and impoverished village. As alliances shift and betrayals unfold, the tournament reveals political conspiracies, government fears of revolt, and the clash between tradition and a modernizing Japan. The series blends historical drama, action, and battle-royale tension, reimagining the samurai code in a world where honor is a luxury." },

    { title: "Altered Carbon", year: "2018", url: "https://www.tvmaze.com/shows/12036/altered-carbon", img: "images/alteredcarbon.jpg", desc: "Altered Carbon takes place in a future where human consciousness can be digitized, stored, and re-sleeved into new bodies, turning death into an inconvenience for the wealthy and a weapon against everyone else. After centuries on ice, elite Envoy operative Takeshi Kovacs is revived and dropped into a conspiracy that spans politics, corporate power, and the ethics of immortality. As he investigates a murder that may not even be a murder, Kovacs navigates a world where identity is fluid, bodies are disposable, and the truth is buried beneath layers of technology and corruption. The deeper he digs, the clearer it becomes that solving the case means confronting the very system that reshaped humanity." },

    { title: "Ancient Apocalypse", year: "2022", url: "https://www.tvmaze.com/shows/64959/ancient-apocalypse", img: "images/ancientapocalypse.jpg", desc: "What if everything we know about prehistoric humans is wrong? Journalist Graham Hancock visits archaeological sites around the world to uncover whether a civilization far more advanced than we ever believed possible existed thousands of years ago." },

    { title: "American Primeval", year: "2025", url: "https://www.tvmaze.com/shows/65577/american-primeval", img: "images/americanprimeval.jpg", desc: "A raw, adventurous exploration of the birth of the American West. The violent collisions of cultures, religions and communities as men and women fight and die for control of this new world - for a land they truly believe is their destiny. The ensemble tells a story of the sacrifice all must pay when they choose to enter a lawless and untamed wilderness." },

    { title: "Ash Vs Evil Dead", year: "2015", url: "https://www.tvmaze.com/shows/2427/ash-vs-evil-dead", img: "images/ashvsevildead.jpg", desc: "Ash is back in Ash vs Evil Dead! 30 years after his last fight, Ash Williams unleashes the Evil in an act of carelessness, bringing Deadite mayhem into his life again. Bruce Campbell will be reprising his role as Ash, the stock boy, aging lothario and chainsaw-handed monster hunter who has spent the last 30 years avoiding responsibility, maturity and the terrors of the Evil Dead. When a Deadite plague threatens to destroy all of mankind, Ash is finally forced to face his demons - personal and literal. Destiny, it turns out, has no plans to release the unlikely hero from its 'Evil' grip." },

    { title: "Black Summer", year: "2019", url: "https://www.tvmaze.com/shows/37805/black-summer", img: "images/blacksummer.jpg", desc: "Black Summer drops into the earliest, most chaotic days of a sudden zombie outbreak, where society collapses faster than anyone can react. Separated from her daughter in the initial panic, Rose is forced to navigate a landscape where every encounter - with the living or the dead - can turn lethal in seconds. As she joins a shifting group of survivors, trust becomes a rare commodity and movement is the only strategy that keeps them alive. The series unfolds as a relentless, ground-level fight for survival, where silence, speed, and split-second decisions determine who makes it through the next hour." },

    { title: "Breaking Bad", year: "2008", url: "https://www.tvmaze.com/shows/169/breaking-bad", img: "images/breakingbad.jpg", desc: "Breaking Bad follows protagonist Walter White, a chemistry teacher who lives in New Mexico with his wife and teenage son who has cerebral palsy. White is diagnosed with Stage III cancer and given a prognosis of two years left to live. With a new sense of fearlessness based on his medical prognosis, and a desire to secure his family's financial security, White chooses to enter a dangerous world of drugs and crime and ascends to power in this world. The series explores how a fatal diagnosis such as White's releases a typical man from the daily concerns and constraints of normal society and follows his transformation from mild family man to a kingpin of the drug trade." },

    { title: "Butterfly", year: "2025", url: "https://www.tvmaze.com/shows/68899/butterfly", img: "images/butterfly.jpg", desc: "Butterfly revolves around David Jung, an enigmatic, highly unpredictable former US intelligence operative living in South Korea, whose life is blown to pieces when the consequences of an impossible decision from his past come back to haunt him, and he finds himself pursued by Rebecca, a deadly, sociopathic young agent assigned to kill him." },

/* ── GALLERY INIT ── */
function initGallery() {
    const grid = document.getElementById('tv-grid');
    if (!grid) return;
    tvData.forEach(show => {
        const card = document.createElement('div');
        card.className = 'tv-card';
        card.innerHTML = `<img src="${show.img}" alt="${show.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/050505/00ffcc?text=NO+IMAGE'">`;
        card.onclick = () => openDossier(show);
        grid.appendChild(card);
    });
}

/* ── MODAL ── */
function openDossier(show) {
    const modal = document.getElementById('tv-modal');
    modal.querySelector('.dossier-title').innerText = show.title;
    modal.querySelector('.dossier-year').innerText  = show.year;
    modal.querySelector('.dossier-desc').innerText  = show.desc;
    modal.querySelector('.dossier-poster').src       = show.img;
    modal.querySelector('.maze-link').href           = show.url;
    modal.style.display = 'flex';
}

function closeDossier() {
    document.getElementById('tv-modal').style.display = 'none';
}

window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('tv-modal')) closeDossier();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDossier();
});

/* ── NAVIGATION DROPDOWN ── */
function initNav() {
    const toggle  = document.getElementById('nav-toggle');
    const content = document.getElementById('nav-content');
    if (!toggle || !content) return;
    toggle.addEventListener('click', () => {
        const open = content.classList.toggle('open');
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', open);
    });
}

/* ── INIT - runs immediately since script is at end of body ── */
initGallery();
initNav();

const closeBtn = document.querySelector('.close-dossier');
if (closeBtn) closeBtn.onclick = closeDossier;

    </script>
