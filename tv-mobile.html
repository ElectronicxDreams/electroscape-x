<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    background: #07080d;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    min-height: 100%;
    overflow-x: hidden;
}

/* ── TOP NAV ──────────────────────────────────────────────── */
#top-nav {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid rgba(0,255,230,0.1);
    background: rgba(5,7,12,0.98);
    position: sticky;
    top: 0;
    z-index: 100;
}

#top-nav a {
    color: rgba(0,255,230,0.75);
    text-decoration: none;
    font-size: 7px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-align: center;
    padding: 13px 4px;
    border-right: 1px solid rgba(0,255,230,0.08);
    transition: color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

#top-nav a:last-child { border-right: none; }
#top-nav a.active     { color: #00FFE6; background: rgba(0,255,230,0.04); }

/* ── WORDMARK ─────────────────────────────────────────────── */
#wordmark {
    text-align: center;
    font-size: 10px;
    letter-spacing: 14px;
    text-indent: 14px;
    color: #00FFE6;
    padding: 18px 0 6px;
    text-transform: uppercase;
    opacity: 0.72;
}

#wordmark-sub {
    text-align: center;
    font-size: 7px;
    letter-spacing: 6px;
    text-indent: 6px;
    color: rgba(0,255,230,0.35);
    text-transform: uppercase;
    padding-bottom: 14px;
}

/* ── POSTER GRID ──────────────────────────────────────────── */
#tv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 12px 10px 40px;
}

@media (max-width: 340px) {
    #tv-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── POSTER CARD ──────────────────────────────────────────── */
.tv-card {
    background: #050505;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: border-color 0.2s;
    position: relative;
}

.tv-card:active { border-color: rgba(0,255,230,0.5); }

.tv-card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
}

/* ── DOSSIER BOTTOM SHEET ─────────────────────────────────── */
#dossier-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 200;
}

#dossier-backdrop.open { display: block; }

#dossier-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 88vh;
    background: #0a0a0a;
    border-top: 1px solid rgba(0,255,230,0.25);
    border-radius: 14px 14px 0 0;
    z-index: 210;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
}

#dossier-sheet.open { transform: translateY(0); }

/* drag handle */
#dossier-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
}

#dossier-scroll {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    padding: 16px 18px 48px;
}

/* poster + title row */
#dossier-top {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 16px;
}

#dossier-poster {
    width: 90px;
    flex-shrink: 0;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #222;
}

#dossier-meta {
    flex: 1;
    padding-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

#dossier-title {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1.3;
}

#dossier-year {
    font-size: 9px;
    letter-spacing: 4px;
    color: #00FFE6;
}

#dossier-close {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: #666;
    font-size: 14px;
    line-height: 1;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: auto;
    align-self: flex-start;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
    font-size: 8px;
    text-transform: uppercase;
}

#dossier-close:active { border-color: #00FFE6; color: #00FFE6; }

#dossier-desc {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.75;
    color: #999;
    margin-bottom: 22px;
}

#dossier-link {
    display: block;
    text-align: center;
    padding: 14px;
    border: 1px solid rgba(0,255,230,0.5);
    border-radius: 5px;
    color: #00FFE6;
    text-decoration: none;
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
}

#dossier-link:active {
    background: rgba(0,255,230,0.08);
}
</style>
</head>

/* ── B. GALLERY INIT ──────────────────────────────────────── */
function initGallery() {
    var grid = document.getElementById('tv-grid');
    tvData.forEach(function(show) {
        var card = document.createElement('div');
        card.className = 'tv-card';
        var img = document.createElement('img');
        img.src     = show.img;
        img.alt     = show.title;
        img.loading = 'lazy';
        img.onerror = function() {
            this.src = 'https://via.placeholder.com/200x300/050505/00FFE6?text=NO+IMAGE';
        };
        card.appendChild(img);
        card.addEventListener('click', function() { openDossier(show); });
        grid.appendChild(card);
    });
}


/* ── C. DOSSIER SHEET ─────────────────────────────────────── */
function openDossier(show) {
    document.getElementById('dossier-poster').src  = show.img;
    document.getElementById('dossier-poster').alt  = show.title;
    document.getElementById('dossier-title').textContent = show.title;
    document.getElementById('dossier-year').textContent  = show.year;
    document.getElementById('dossier-desc').textContent  = show.desc;
    document.getElementById('dossier-link').href         = show.url;
    /* reset scroll */
    document.getElementById('dossier-scroll').scrollTop = 0;

    document.getElementById('dossier-backdrop').classList.add('open');
    document.getElementById('dossier-sheet').classList.add('open');
}

function closeDossier() {
    document.getElementById('dossier-backdrop').classList.remove('open');
    document.getElementById('dossier-sheet').classList.remove('open');
}

document.getElementById('dossier-close').addEventListener('click', closeDossier);
document.getElementById('dossier-backdrop').addEventListener('click', closeDossier);
